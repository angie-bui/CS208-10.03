<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>To-Do List</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />

	<body>
    <h1>To-Do List</h1>

    <p>
        <label for="new-task">New task:</label>
        <input type="text" id="new-task" value="Complete JavaScript lab">
        <button id="add-button">Add</button>
    </p>

    <ol>
        <li><span class="task-text">Clean room</span><button class="done-btn">&#10006;</button></li>
        <li><span class="task-text">Go for a walk</span><button class="done-btn">&#10006;</button></li>
        <li><span class="task-text">Eat lunch</span><button class="done-btn">&#10006;</button></li>
    </ol>

    <script src="script.js"></script>
</body>

</html>
